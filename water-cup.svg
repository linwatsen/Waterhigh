<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Background (soft blue rounded square for app icon) -->
  <rect width="512" height="512" rx="112" fill="#f0f9ff"/>
  
  <!-- Water Cup Group -->
  <g transform="translate(106, 70)">
    <!-- Water inside the cup -->
    <!-- Water level at ~60% height -->
    <path d="M 45 190 L 255 190 L 232 310 C 230 325 215 330 200 330 L 100 330 C 85 330 70 325 68 310 Z" fill="#38bdf8"/>
    <!-- Water surface ellipse to create depth -->
    <ellipse cx="150" cy="190" rx="105" ry="15" fill="#0ea5e9"/>
    
    <!-- Glass Cup Outline -->
    <!-- Top opening -->
    <ellipse cx="150" cy="50" rx="120" ry="20" fill="none" stroke="#475569" stroke-width="16"/>
    <!-- Cup body -->
    <path d="M 30 50 L 68 310 C 70 325 85 340 100 340 L 200 340 C 215 340 230 325 232 310 L 270 50" fill="none" stroke="#475569" stroke-width="16" stroke-linejoin="round" stroke-linecap="round"/>
    
    <!-- Light reflection highlight -->
    <path d="M 55 90 L 75 230" fill="none" stroke="#ffffff" stroke-width="10" stroke-linecap="round" opacity="0.6"/>
  </g>
</svg>
